version: '3.8'

services:
  rentall:
    container_name: ${CONTAINER_NAME:-rentall-jyb-container}
    build:
      context: .
      dockerfile: Dockerfile
    image: rentall:${IMAGE_TAG:-latest}
    ports:
      - "${HOST_PORT:-3000}:3000"
    volumes:
      - ${DB_PATH:-./database}:/app/database
      - ${BACKUP_PATH:-./backups}:/app/backups
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - NEXT_TELEMETRY_DISABLED=1
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - TZ=America/Costa_Rica
      - DB_PATH=/app/database/rentall.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000 && test -f /app/database/rentall.db || exit 1"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 40s
