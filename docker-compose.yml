version: '3.8'

services:
  rentall:
    container_name: ${CONTAINER_NAME:-rentall-jye-container}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PORT: ${HOST_PORT:-3005}
        NEXT_PUBLIC_ENV: ${NEXT_PUBLIC_ENV:-production}
    image: rentall:${IMAGE_TAG:-latest}
    ports:
      - "${HOST_PORT:-3005}:${HOST_PORT:-3005}"
    volumes:
      - ${DB_DIR:-./database}:/app/database
      - ${BACKUP_DIR:-./backups}:/app/backups
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - NEXT_PUBLIC_ENV=${NEXT_PUBLIC_ENV:-production}
      - NEXT_TELEMETRY_DISABLED=1
      - PORT=${HOST_PORT:-3005}
      - HOSTNAME=0.0.0.0
      - TZ=America/Costa_Rica
      - DB_PATH=/app/database/rentall.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:${HOST_PORT:-3005} && test -f /app/database/rentall.db || exit 1"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 40s
