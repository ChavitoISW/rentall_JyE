name: 🚀 Pipeline CI/CD Completo

on:
  push:
    branches: [ main, dev, testqa ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # FASE 1: Build y Test (ejecutan en paralelo)
  build:
    name: 🏗️ Build & Test
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout código
      uses: actions/checkout@v4
    
    - name: 🟢 Configurar Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: 📦 Instalar dependencias
      run: npm install
    
    - name: 🔍 Type checking
      run: npm run type-check
    
    - name: 🏗️ Build Next.js
      run: npm run build
      env:
        NODE_ENV: production
        NEXT_TELEMETRY_DISABLED: 1
    
    - name: ✅ Build exitoso
      run: echo "✅ Build completado correctamente"

  quality:
    name: 📊 Code Quality
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout código
      uses: actions/checkout@v4
    
    - name: 🟢 Configurar Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: 📦 Instalar dependencias
      run: npm install
    
    - name: 🔍 TypeScript Check
      run: npm run type-check
    
    - name: 📊 Análisis de código
      run: |
        echo "📊 Análisis de código completado"
        echo "Total de archivos TypeScript:"
        find src -name "*.ts" -o -name "*.tsx" | wc -l
    
    - name: ✅ Quality checks pasados
      run: echo "✅ Todos los checks de calidad pasaron correctamente"

  # FASE 2: Build de imagen (requiere que pasen build y quality)
  docker-build:
    name: 🐳 Build & Push Imagen
    runs-on: ubuntu-latest
    needs: [build, quality]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: 📥 Checkout código
      uses: actions/checkout@v4
    
    - name: 🔤 Convertir nombre de repositorio a minúsculas
      id: lowercase
      run: |
        echo "image_name=$(echo ${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
    
    - name: 🐳 Instalar Podman
      run: |
        sudo apt-get update
        sudo apt-get -y install podman
        podman --version
    
    - name: 🔐 Login a GitHub Container Registry
      run: |
        echo "${{ secrets.GITHUB_TOKEN }}" | podman login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
    
    - name: 📝 Generar tags
      id: tags
      run: |
        IMAGE=${{ env.REGISTRY }}/${{ steps.lowercase.outputs.image_name }}
        TAGS="${IMAGE}:${GITHUB_SHA::8}"
        if [[ $GITHUB_REF == refs/heads/main ]]; then
          TAGS="${TAGS},${IMAGE}:latest"
        fi
        if [[ $GITHUB_REF == refs/tags/* ]]; then
          VERSION=${GITHUB_REF#refs/tags/}
          TAGS="${TAGS},${IMAGE}:${VERSION}"
        fi
        echo "tags=${TAGS}" >> $GITHUB_OUTPUT
        echo "Tags generados: ${TAGS}"
    
    - name: 🏗️ Build imagen con Podman
      run: |
        podman build \
          -t ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.image_name }}:${GITHUB_SHA::8} \
          -f ./Dockerfile \
          .
    
    - name: 📤 Push imagen a Registry
      run: |
        IFS=',' read -ra TAGS <<< "${{ steps.tags.outputs.tags }}"
        for tag in "${TAGS[@]}"; do
          echo "Pushing ${tag}..."
          podman tag ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.image_name }}:${GITHUB_SHA::8} ${tag}
          podman push ${tag}
        done
    
    - name: ✅ Imagen Podman lista
      run: echo "✅ Imagen construida y publicada en ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.image_name }}"

  # FASE 3: Deploy (requiere que pase docker-build, solo en main y testqa)
  deploy:
    name: 🚀 Deploy a ${{ github.ref == 'refs/heads/main' && 'Producción' || 'Pruebas' }}
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/testqa')
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'test' }}
    
    steps:
    - name: 📥 Checkout código
      uses: actions/checkout@v4
    
    - name: 🔐 Setup SSH
      uses: webfactory/ssh-agent@v0.8.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
    
    - name: 🚀 Deploy a servidor con Podman
      run: |
        echo "🚀 Iniciando deployment a ${{ github.ref == 'refs/heads/main' && 'PRODUCCIÓN' || 'PRUEBAS' }}..."
        ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} <<'ENDSSH'
          set -e
          
          # Detectar rama para configurar ambiente
          BRANCH="${{ github.ref_name }}"
          
          if [ "$BRANCH" = "main" ]; then
            ENV_FILE=".env.production"
            CONTAINER_NAME="rentall-jyb-container"
            ENV_NAME="PRODUCCIÓN"
            DB_DIR="database"
            BACKUP_DIR="backups"
            HOST_PORT="3000"
            NODE_ENV="production"
          elif [ "$BRANCH" = "testqa" ]; then
            ENV_FILE=".env.testqa"
            CONTAINER_NAME="rentall-test-container"
            ENV_NAME="PRUEBAS"
            DB_DIR="database/test"
            BACKUP_DIR="backups/test"
            HOST_PORT="3002"
            NODE_ENV="test"
          else
            echo "❌ Rama no configurada para deployment: $BRANCH"
            exit 1
          fi
          
          echo "📋 Configuración:"
          echo "  - Ambiente: $ENV_NAME"
          echo "  - Rama: $BRANCH"
          echo "  - Contenedor: $CONTAINER_NAME"
          echo "  - Base de datos: $DB_DIR"
          echo "  - Puerto: $HOST_PORT"
          
          # Asegurar que podman-compose esté en el PATH
          export PATH="$HOME/.local/bin:/usr/local/bin:$PATH"
          
          # Cargar bashrc si existe
          [ -f ~/.bashrc ] && source ~/.bashrc
          
          # Usar siempre el home del usuario logueado
          DEPLOY_DIR="$HOME/rentall"
          
          # Verificar si es un repositorio git válido
          if [ -d "$DEPLOY_DIR/.git" ]; then
            echo "📂 Repositorio existe, actualizando código..."
            cd "$DEPLOY_DIR"
            git fetch origin
            git checkout "$BRANCH"
            git pull origin "$BRANCH"
          else
            # Si existe algo, eliminarlo
            if [ -d "$DEPLOY_DIR" ]; then
              echo "⚠️  Eliminando directorio anterior..."
              rm -rf "$DEPLOY_DIR"
            fi
            
            echo "📁 Creando directorio $DEPLOY_DIR..."
            mkdir -p "$DEPLOY_DIR"
            
            echo "📥 Clonando repositorio..."
            git clone https://github.com/${{ github.repository }}.git "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"
            git checkout "$BRANCH"
          fi
          
          # Crear directorios necesarios para este ambiente
          if [ "$BRANCH" = "main" ]; then
            echo "📁 Verificando directorios de producción (mantiene estructura actual)..."
            # Solo verificar que existan, no crear subdirectorios
            mkdir -p database backups
          else
            echo "📁 Creando directorios para $ENV_NAME..."
            mkdir -p "$DB_DIR" "$BACKUP_DIR"
            
            # Copiar base de datos de producción a pruebas
            if [ -f "database/rentall.db" ]; then
              echo "📋 Copiando base de datos de PRODUCCIÓN a PRUEBAS..."
              echo "⚠️  Creando respaldo de DB actual de pruebas (si existe)..."
              if [ -f "$DB_DIR/rentall.db" ]; then
                TIMESTAMP=$(date +%Y%m%d_%H%M%S)
                cp "$DB_DIR/rentall.db" "$BACKUP_DIR/rentall-backup-before-copy-${TIMESTAMP}.db"
                echo "✅ Backup guardado: $BACKUP_DIR/rentall-backup-before-copy-${TIMESTAMP}.db"
              fi
              
              echo "📦 Copiando database/rentall.db → $DB_DIR/rentall.db"
              cp database/rentall.db "$DB_DIR/rentall.db"
              echo "✅ Base de datos copiada exitosamente"
              echo "ℹ️  El ambiente de pruebas ahora tiene los datos actuales de producción"
            else
              echo "⚠️  Base de datos de producción no encontrada, usando DB de pruebas existente"
            fi
          fi
          
          # Copiar archivo .env según ambiente
          if [ -f "$ENV_FILE" ]; then
            echo "📋 Cargando configuración de $ENV_FILE..."
            cp "$ENV_FILE" .env
            source .env 2>/dev/null || true
          else
            echo "⚠️  Archivo $ENV_FILE no encontrado, usando valores por defecto"
          fi
          
          # Detener solo el contenedor de este ambiente (sin afectar otros contenedores)
          echo "🛑 Deteniendo ÚNICAMENTE el contenedor: $CONTAINER_NAME"
          echo "⚠️  Otros contenedores en el servidor NO serán afectados"
          
          # Verificar si existe antes de detener
          if podman ps -a --format "{{.Names}}" | grep -q "^${CONTAINER_NAME}$"; then
            echo "📦 Contenedor $CONTAINER_NAME encontrado, procediendo a detener..."
            podman stop "$CONTAINER_NAME" 2>/dev/null || true
            podman rm "$CONTAINER_NAME" 2>/dev/null || true
            echo "✅ Contenedor $CONTAINER_NAME detenido y eliminado"
          else
            echo "ℹ️  Contenedor $CONTAINER_NAME no existe (primera vez)"
          fi
          
          # Verificar que el otro ambiente NO fue tocado
          if [ "$BRANCH" = "main" ]; then
            OTHER_CONTAINER="rentall-test-container"
          else
            OTHER_CONTAINER="rentall-prod-container"
          fi
          
          if podman ps -a --format "{{.Names}}" | grep -q "^${OTHER_CONTAINER}$"; then
            echo "✅ Verificado: Contenedor $OTHER_CONTAINER sigue intacto"
          fi
          
          # Rebuild con Podman usando tag específico del ambiente
          echo "🏗️ Construyendo imagen para $ENV_NAME..."
          if [ "$BRANCH" = "main" ]; then
            IMAGE_TAG="rentall:prod"
            BUILD_ENV="production"
          else
            IMAGE_TAG="rentall:test"
            BUILD_ENV="test"
          fi
          
          podman build --build-arg NEXT_PUBLIC_ENV="$BUILD_ENV" -t "$IMAGE_TAG" .
          echo "✅ Imagen $IMAGE_TAG construida"
          
          # Iniciar contenedor directamente con podman (sin compose)
          echo "🚀 Iniciando ÚNICAMENTE el contenedor $CONTAINER_NAME..."
          
          # Construir comando podman run con todas las opciones
          podman run -d \
            --name "$CONTAINER_NAME" \
            -p "${HOST_PORT}:3000" \
            -v "$(pwd)/${DB_DIR}:/app/database" \
            -v "$(pwd)/${BACKUP_DIR}:/app/backups" \
            -e NODE_ENV="${NODE_ENV:-production}" \
            -e NEXT_PUBLIC_ENV="$BUILD_ENV" \
            -e NEXT_TELEMETRY_DISABLED=1 \
            -e PORT=3000 \
            -e HOSTNAME=0.0.0.0 \
            -e TZ=America/Costa_Rica \
            -e DB_PATH=/app/database/rentall.db \
            --restart unless-stopped \
            "$IMAGE_TAG"
          
          echo "✅ Contenedor $CONTAINER_NAME iniciado"
          
          # Verificar que solo se levantó el contenedor correcto
          echo "🔍 Verificando que se levantó el contenedor correcto..."
          if podman ps --format "{{.Names}}" | grep -q "^${CONTAINER_NAME}$"; then
            echo "✅ Contenedor $CONTAINER_NAME está corriendo"
          else
            echo "❌ Error: Contenedor $CONTAINER_NAME no está corriendo"
            exit 1
          fi
          
          # Esperar a que el contenedor esté listo
          echo "⏳ Esperando a que el contenedor esté listo..."
          sleep 10
          
          # Validar y sincronizar esquema de base de datos
          echo "🔍 Validando esquema de base de datos de $ENV_NAME..."
          podman exec "$CONTAINER_NAME" node scripts/validate-and-sync-db-schema.js
          
          if [ $? -eq 0 ]; then
            echo "✅ Esquema de base de datos validado para $ENV_NAME"
          else
            echo "❌ Error en la validación del esquema de $ENV_NAME"
            exit 1
          fi
          
          # Crear/actualizar vistas SQL
          echo "🔄 Actualizando vistas de base de datos..."
          podman exec "$CONTAINER_NAME" sqlite3 /app/database/rentall.db "CREATE VIEW IF NOT EXISTS vista_bitacora_equipo AS SELECT be.id_bitacora, be.id_equipo, e.nombre_equipo, be.id_solicitud_equipo, be.numero_solicitud_equipo, be.cantidad_equipo, be.fecha_inicio, be.fecha_devolucion, e.estado_uso, be.estado_bitacora, be.observaciones, (cl.nombre_cliente || ' ' || COALESCE(cl.apellidos_cliente, '')) as nombre_cliente, c.id_contrato, be.created_at FROM bitacora_equipo be INNER JOIN equipo e ON be.id_equipo = e.id_equipo INNER JOIN encabezado_solicitud_equipo ese ON be.id_solicitud_equipo = ese.id_solicitud_equipo INNER JOIN cliente cl ON ese.id_cliente = cl.id_cliente LEFT JOIN contrato c ON ese.id_solicitud_equipo = c.id_solicitud_equipo;"
          
          if [ $? -eq 0 ]; then
            echo "✅ Vistas de base de datos actualizadas"
          else
            echo "⚠️  Error al actualizar vistas (puede ser que ya existan)"
          fi
          
          # Verificar estado
          echo "✅ Verificando contenedor $CONTAINER_NAME..."
          podman ps | grep "$CONTAINER_NAME"
          
          echo "🎉 Deployment de $ENV_NAME completado exitosamente"
          echo "📍 Puerto: $HOST_PORT"
          echo "📁 Base de datos: $DB_DIR"
        ENDSSH
    
    - name: ✅ Deployment exitoso
      run: echo "✅ Aplicación desplegada correctamente en ${{ github.ref == 'refs/heads/main' && 'PRODUCCIÓN' || 'PRUEBAS' }}"
    
    - name: 🔔 Notificación de éxito
      if: success()
      run: echo "🎉 Deployment exitoso en ${{ github.sha }}"
    
    - name: ❌ Notificación de error
      if: failure()
      run: echo "❌ Error en el deployment"

  # RESUMEN: Solo para información
  pipeline-summary:
    name: 📋 Resumen del Pipeline
    runs-on: ubuntu-latest
    needs: [build, quality, docker-build, deploy]
    if: always()
    
    steps:
    - name: 📊 Estado del Pipeline
      run: |
        echo "📋 Resumen del Pipeline CI/CD"
        echo "================================"
        echo "Build: ${{ needs.build.result }}"
        echo "Quality: ${{ needs.quality.result }}"
        echo "Docker Build: ${{ needs.docker-build.result }}"
        echo "Deploy: ${{ needs.deploy.result }}"
        echo "================================"
        
        if [[ "${{ needs.build.result }}" == "success" ]] && \
           [[ "${{ needs.quality.result }}" == "success" ]] && \
           [[ "${{ needs.docker-build.result }}" == "success" ]] && \
           [[ "${{ needs.deploy.result }}" == "success" || "${{ needs.deploy.result }}" == "skipped" ]]; then
          echo "✅ Pipeline completado exitosamente"
          exit 0
        else
          echo "❌ Hubo errores en el pipeline"
          exit 1
        fi
