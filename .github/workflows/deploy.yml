name: Deploy to Production

on:
  push:
    branches: [ main, testqa ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    
    steps:
    - name: 📥 Checkout código
      uses: actions/checkout@v4
    
    - name: 🔐 Setup SSH
      uses: webfactory/ssh-agent@v0.8.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
    
    - name: 🚀 Deploy a servidor con Podman
      run: |
        echo "🚀 Iniciando deployment a producción..."
        ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'ENDSSH'
          cd ${{ secrets.DEPLOY_PATH }}
          git pull origin main
          
          # Detener contenedores con podman-compose
          podman-compose down || true
          
          # Rebuild con Podman
          podman build -t rentall:latest .
          
          # Iniciar con podman-compose
          podman-compose up -d
          
          # Verificar estado
          podman ps
          
          echo "✅ Deployment completado"
        ENDSSH
    
    - name: ✅ Deployment exitoso
      run: echo "✅ Aplicación desplegada correctamente en producción"
    
    - name: 🔔 Notificación de éxito
      if: success()
      run: echo "🎉 Deployment exitoso en ${{ github.sha }}"
    
    - name: ❌ Notificación de error
      if: failure()
      run: echo "❌ Error en el deployment"
